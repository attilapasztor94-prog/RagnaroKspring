<!doctype html>
<html lang="ro">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Ragnarok ICS</title>

    <!-- CSS extern -->
    <link rel="stylesheet" href="/style.css">

    <!-- SVG Favicon - R simplu, clar la orice dimensiune -->
    <link rel="icon" type="image/svg+xml"
          href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20100%20100'%3E%3Ccircle%20cx='50'%20cy='50'%20r='50'%20fill='black'/%3E%3Ctext%20x='50'%20y='68'%20text-anchor='middle'%20font-size='64'%20font-family='Arial'%20font-weight='700'%20fill='white'%3ER%3C/text%3E%3C/svg%3E" />
</head>

<body>
<div class="app">

    <div class="left">
        <h2 style="margin:0">Ragnarok ICS</h2>

        <div id="chatOut"></div>

        <div class="row">
            <input id="chatMsg" placeholder="Scrie un mesaj..." />
            <button type="button" class="btn" id="sendBtn">Send</button>
            <button type="button" class="btn" id="newBtn">New</button>
        </div>

        <div class="muted">
            Apasă pe o conversație din dreapta pentru a încărca istoricul.
        </div>
    </div>

    <div class="right">
        <h3 style="margin-top:0">Conversations</h3>
        <div id="convList"></div>
    </div>

</div>

<script>
    document.addEventListener("DOMContentLoaded", () => {

        let conversationId = null;
        let isBusy = false;

        const chatOut = document.getElementById("chatOut");
        const convList = document.getElementById("convList");
        const chatMsg = document.getElementById("chatMsg");
        const sendBtn = document.getElementById("sendBtn");
        const newBtn = document.getElementById("newBtn");

        function setBusy(v) {
            isBusy = v;
            sendBtn.disabled = v;
            newBtn.disabled = v;
        }

        function appendLine(text) {
            chatOut.textContent += text + "\n\n";
            chatOut.scrollTop = chatOut.scrollHeight;
        }

        function renderMessages(messages) {
            chatOut.textContent = "";
            if (!Array.isArray(messages)) return;

            for (const m of messages) {
                const role = (m.role ?? "ASSISTANT").toString().toUpperCase();
                const content = (m.content ?? "").toString();
                appendLine(`${role}: ${content}`);
            }
        }

        function normalizeId(obj) {
            return obj?.conversationId
                ?? obj?.conversationID
                ?? obj?.id
                ?? obj?.ID
                ?? obj?.chatId
                ?? obj?.chatID
                ?? obj?.chatid
                ?? null;
        }

        async function safeJson(res) {
            const text = await res.text().catch(() => "");
            if (!text) return null;
            try { return JSON.parse(text); } catch { return { raw: text }; }
        }

        async function refreshConversations() {
            try {
                const res = await fetch("/api/chat/chats");
                if (!res.ok) throw new Error("GET /api/chat/chats failed");

                const list = await res.json();
                convList.innerHTML = "";

                if (!Array.isArray(list) || list.length === 0) {
                    convList.innerHTML = "<div class='muted'>Nu există conversații</div>";
                    return;
                }

                for (const c of list) {
                    const id = normalizeId(c);
                    if (!id) continue;

                    const div = document.createElement("div");
                    div.className = "conv" + (String(conversationId) === String(id) ? " active" : "");
                    div.innerHTML = `
                    <div><b>#${id}</b> ${(c.title ?? "Chat")}</div>
                    <div class="muted">${(c.updatedAt ?? c.createdAt ?? "")}</div>
                `;
                    div.addEventListener("click", () => loadConversation(id));
                    convList.appendChild(div);
                }

            } catch (e) {
                console.error(e);
                convList.innerHTML = "<div class='error'>Eroare la încărcarea conversațiilor.</div>";
            }
        }

        async function loadConversation(id) {
            try {
                conversationId = id;

                const res = await fetch(`/api/chat/chats/${id}/messages`);
                if (!res.ok) throw new Error("GET messages failed");

                const msgs = await res.json();
                renderMessages(msgs);
                await refreshConversations();

            } catch (e) {
                console.error(e);
                chatOut.textContent = "Eroare la încărcarea conversației.";
            }
        }

        async function newChat() {
            conversationId = null;
            chatOut.textContent = "";
            chatMsg.value = "";
            chatMsg.focus();
            await refreshConversations();
        }

        async function sendChat() {
            if (isBusy) return;

            const message = chatMsg.value.trim();
            if (!message) return;

            setBusy(true);

            chatMsg.value = "";
            appendLine(`USER: ${message}`);
            appendLine(`ASSISTANT: typing...`);

            try {
                const res = await fetch("/api/chat/send", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        conversationId: conversationId,
                        message: message
                    })
                });

                if (!res.ok) {
                    const err = await res.text().catch(() => "");
                    throw new Error(err);
                }

                const data = await safeJson(res);
                const newId = normalizeId(data);

                if (!newId) {
                    throw new Error("Server-ul nu a întors ID de conversație.");
                }

                conversationId = newId;

                const res2 = await fetch(`/api/chat/chats/${conversationId}/messages`);
                if (!res2.ok) throw new Error("Fetch messages failed");

                const msgs = await res2.json();
                renderMessages(msgs);
                await refreshConversations();

            } catch (e) {
                console.error(e);
                appendLine("SYSTEM: Eroare la trimiterea mesajului.");
            } finally {
                setBusy(false);
            }
        }

        window.addEventListener("error", e =>
            console.error("JS error:", e.error || e.message)
        );

        window.addEventListener("unhandledrejection", e =>
            console.error("Unhandled rejection:", e.reason)
        );

        sendBtn.addEventListener("click", e => {
            e.preventDefault();
            e.stopPropagation();
            sendChat();
        });

        newBtn.addEventListener("click", e => {
            e.preventDefault();
            e.stopPropagation();
            newChat();
        });

        refreshConversations();
    });
</script>

</body>
</html>
