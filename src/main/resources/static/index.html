<!doctype html>
<html lang="ro">
<head>
    <meta charset="utf-8"/>
    <title>Ragnarok ICS</title>

    <style>
        body { font-family: Arial, sans-serif; margin: 0; }
        .app { display: flex; height: 100vh; }

        .left {
            flex: 3;
            padding: 16px;
            border-right: 1px solid #ddd;
            display:flex;
            flex-direction:column;
        }

        .right {
            flex: 1.4;
            padding: 16px;
            overflow:auto;
        }

        #chatOut {
            flex: 1;
            border: 1px solid #ddd;
            padding: 12px;
            overflow:auto;
            white-space: pre-wrap;
        }

        .row { display:flex; gap:8px; margin-top: 10px; }
        #chatMsg { flex: 1; padding: 8px; }

        .conv {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            margin-bottom: 8px;
            cursor: pointer;
        }

        .conv.active { border-color: #333; }
        .muted { color:#666; font-size: 12px; }
        .error { color: red; }
        .btn { padding: 8px 12px; }
    </style>
</head>

<body>
<div class="app">

    <div class="left">
        <h2>Ragnarok ICS</h2>

        <div id="chatOut"></div>

        <div class="row">
            <input id="chatMsg" placeholder="Scrie un mesaj..." />
            <button type="button" class="btn" id="sendBtn">Send</button>
            <button type="button" class="btn" id="newBtn">New</button>
        </div>

        <div class="muted">
            Apasă pe o conversație din dreapta pentru a încărca istoricul.
        </div>
    </div>

    <div class="right">
        <h3>Conversations</h3>
        <div id="convList"></div>
    </div>

</div>

<script>
    document.addEventListener("DOMContentLoaded", () => {

        let conversationId = null;
        let isSending = false;

        const chatOut = document.getElementById("chatOut");
        const convList = document.getElementById("convList");
        const chatMsg = document.getElementById("chatMsg");
        const sendBtn = document.getElementById("sendBtn");
        const newBtn = document.getElementById("newBtn");

        function appendLine(text) {
            chatOut.textContent += text + "\n\n";
            chatOut.scrollTop = chatOut.scrollHeight;
        }

        function renderChat(messages){
            chatOut.textContent = "";
            if (!Array.isArray(messages)) return;

            for (const m of messages){
                appendLine(`${m.role}: ${m.content}`);
            }
        }

        function setButtonsDisabled(disabled) {
            sendBtn.disabled = disabled;
            newBtn.disabled = disabled;
        }

        function extractConversationId(data) {
            // backend-ul poate întoarce diferit: {conversationId}, {id}, {chatId}
            return data?.conversationId ?? data?.id ?? data?.chatId ?? null;
        }

        async function refreshConversations(){
            try {
                const res = await fetch('/api/chat/chats');
                if (!res.ok) throw new Error("GET /api/chat/chats failed");

                const list = await res.json();
                convList.innerHTML = "";

                if (!Array.isArray(list) || list.length === 0){
                    convList.innerHTML = "<div class='muted'>Nu există conversații</div>";
                    return;
                }

                for (const c of list){
                    const div = document.createElement("div");
                    div.className = "conv" + (conversationId === c.id ? " active" : "");
                    div.innerHTML = `
            <div><b>#${c.id}</b> ${c.title ?? "Chat"}</div>
            <div class="muted">${c.updatedAt ?? ""}</div>
          `;
                    div.onclick = () => loadConversation(c.id);
                    convList.appendChild(div);
                }

            } catch (e) {
                console.error(e);
                convList.innerHTML = "<div class='error'>Server indisponibil</div>";
            }
        }

        async function loadConversation(id){
            try {
                conversationId = id;

                const res = await fetch(`/api/chat/chats/${id}/messages`);
                if (!res.ok) throw new Error(`GET /api/chat/chats/${id}/messages failed`);

                const msgs = await res.json();
                renderChat(msgs);

                refreshConversations();
            } catch (e) {
                console.error(e);
                chatOut.textContent = "Eroare la încărcarea conversației.";
            }
        }

        async function sendChat(){
            if (isSending) return;

            const message = chatMsg.value.trim();
            if (!message) return;

            isSending = true;
            setButtonsDisabled(true);

            chatMsg.value = "";

            // Afișăm instant (UX)
            appendLine(`USER: ${message}`);
            appendLine(`ASSISTANT: typing...`);

            try {
                const res = await fetch('/api/chat/send', {
                    method:'POST',
                    headers:{'Content-Type':'application/json'},
                    body: JSON.stringify({
                        conversationId: conversationId, // poate fi null => backend creează chat nou
                        message: message
                    })
                });

                if (!res.ok) {
                    const t = await res.text().catch(() => "");
                    throw new Error(`POST /api/chat/send failed. ${t}`);
                }

                const data = await res.json();
                const newId = extractConversationId(data);

                if (!newId) {
                    console.error("Răspuns /api/chat/send fără conversationId:", data);
                    throw new Error("Server-ul nu a întors conversationId (id/chatId/conversationId).");
                }

                conversationId = newId;

                // Reîncărcăm conversația reală (aici era bug-ul: undefined)
                const res2 = await fetch(`/api/chat/chats/${conversationId}/messages`);
                if (!res2.ok) {
                    const t2 = await res2.text().catch(() => "");
                    throw new Error(`GET /api/chat/chats/${conversationId}/messages failed. ${t2}`);
                }

                const msgs = await res2.json();
                renderChat(msgs);

                refreshConversations();

            } catch (e) {
                console.error(e);
                appendLine(`SYSTEM: Eroare la trimiterea mesajului. Verifică consola (F12).`);
            } finally {
                isSending = false;
                setButtonsDisabled(false);
            }
        }

        function newChat(){
            conversationId = null;
            chatOut.textContent = "";
            refreshConversations();
            chatMsg.focus();
        }

        // “Airbag” pt. erori JS
        window.addEventListener("error", (e) => {
            console.error("JS error:", e.error || e.message);
        });
        window.addEventListener("unhandledrejection", (e) => {
            console.error("Unhandled promise rejection:", e.reason);
        });

        sendBtn.addEventListener("click", (e) => {
            e.preventDefault();
            e.stopPropagation();
            sendChat();
        });

        newBtn.addEventListener("click", (e) => {
            e.preventDefault();
            e.stopPropagation();
            newChat();
        });

        refreshConversations();
    });
</script>

</body>
</html>
