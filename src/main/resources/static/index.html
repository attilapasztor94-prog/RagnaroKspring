<!doctype html>
<html lang="ro">
<head>
    <meta charset="utf-8"/>
    <title>Ragnarok ICS</title>

    <style>
        body { font-family: Arial, sans-serif; margin: 0; }
        .app { display: flex; height: 100vh; }

        .left {
            flex: 3;
            padding: 16px;
            border-right: 1px solid #ddd;
            display:flex;
            flex-direction:column;
        }

        .right {
            flex: 1.4;
            padding: 16px;
            overflow:auto;
        }

        #chatOut {
            flex: 1;
            border: 1px solid #ddd;
            padding: 12px;
            overflow:auto;
            white-space: pre-wrap;
        }

        .row { display:flex; gap:8px; margin-top: 10px; }
        #chatMsg { flex: 1; padding: 8px; }

        .conv {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            margin-bottom: 8px;
            cursor: pointer;
        }

        .conv.active { border-color: #333; }
        .muted { color:#666; font-size: 12px; }
        .error { color: red; }
    </style>
</head>

<body>

<div class="app">

    <div class="left">
        <h2>Ragnarok ICS</h2>

        <div id="chatOut"></div>

        <div class="row">
            <input id="chatMsg" placeholder="Scrie un mesaj..." />
            <button id="sendBtn">Send</button>
            <button id="newBtn">New</button>
        </div>

        <div class="muted">
            Apasă pe o conversație din dreapta pentru a încărca istoricul.
        </div>
    </div>

    <div class="right">
        <h3>Conversations</h3>
        <div id="convList"></div>
    </div>

</div>

<script>
    document.addEventListener("DOMContentLoaded", () => {

        let conversationId = null;

        const chatOut = document.getElementById("chatOut");
        const convList = document.getElementById("convList");
        const chatMsg = document.getElementById("chatMsg");
        const sendBtn = document.getElementById("sendBtn");
        const newBtn = document.getElementById("newBtn");

        function appendLine(text) {
            chatOut.textContent += text + "\n\n";
            chatOut.scrollTop = chatOut.scrollHeight;
        }

        function renderChat(messages){
            chatOut.textContent = "";
            if (!Array.isArray(messages)) return;

            for (const m of messages){
                appendLine(`${m.role}: ${m.content}`);
            }
        }

        async function refreshConversations(){
            try {
                const res = await fetch('/api/chat/chats');
                if (!res.ok) throw new Error();

                const list = await res.json();
                convList.innerHTML = "";

                if (!Array.isArray(list) || list.length === 0){
                    convList.innerHTML = "<div class='muted'>Nu există conversații</div>";
                    return;
                }

                for (const c of list){
                    const div = document.createElement("div");
                    div.className = "conv" + (conversationId === c.id ? " active" : "");
                    div.innerHTML = `
                    <div><b>#${c.id}</b> ${c.title ?? "Chat"}</div>
                    <div class="muted">${c.updatedAt ?? ""}</div>
                `;

                    div.onclick = () => loadConversation(c.id);
                    convList.appendChild(div);
                }

            } catch {
                convList.innerHTML = "<div class='error'>Server indisponibil</div>";
            }
        }

        async function loadConversation(id){
            try {
                conversationId = id;

                const res = await fetch(`/api/chat/chats/${id}/messages`);
                if (!res.ok) throw new Error();

                const msgs = await res.json();
                renderChat(msgs);

                refreshConversations();

            } catch {
                chatOut.textContent = "Eroare la încărcarea conversației.";
            }
        }

        async function sendChat(){
            const message = chatMsg.value.trim();
            if (!message) return;

            chatMsg.value = "";

            // 🔥 Afișăm instant mesajul
            appendLine(`USER: ${message}`);
            appendLine(`ASSISTANT: typing...`);

            try {
                const res = await fetch('/api/chat/send', {
                    method:'POST',
                    headers:{'Content-Type':'application/json'},
                    body: JSON.stringify({
                        conversationId: conversationId,
                        message: message
                    })
                });

                if (!res.ok) throw new Error();

                const data = await res.json();
                conversationId = data.conversationId;

                // 🔥 Reîncărcăm conversația reală
                const res2 = await fetch(`/api/chat/chats/${conversationId}/messages`);
                const msgs = await res2.json();
                renderChat(msgs);

                refreshConversations();

            } catch {
                chatOut.textContent = "Eroare la trimiterea mesajului.";
            }
        }

        function newChat(){
            conversationId = null;
            chatOut.textContent = "";
            refreshConversations();
        }

        sendBtn.addEventListener("click", sendChat);
        newBtn.addEventListener("click", newChat);

        refreshConversations();
    });
</script>

</body>
</html>
