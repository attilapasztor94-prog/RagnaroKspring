<script>
    let conversationId = null;

    function renderChat(messages){
        const out = document.getElementById('chatOut');
        out.textContent = "";

        if (!Array.isArray(messages)) {
            out.textContent = "Eroare la încărcarea mesajelor.";
            return;
        }

        for (const m of messages){
            out.textContent += `${m.role}: ${m.content}\n\n`;
        }

        out.scrollTop = out.scrollHeight;
    }

    async function refreshConversations(){
        try {
            const res = await fetch('/api/chat/chats');
            if (!res.ok) throw new Error();

            const list = await res.json();
            const box = document.getElementById('convList');
            box.innerHTML = "";

            if (!Array.isArray(list) || list.length === 0) {
                box.innerHTML = "<div class='muted'>Nu există conversații</div>";
                return;
            }

            for (const c of list){
                const div = document.createElement('div');
                div.className = "conv" + (conversationId === c.id ? " active" : "");

                div.innerHTML = `
                    <div><b>#${c.id}</b> ${c.title ?? "Chat"}</div>
                    <div class="muted">${c.updatedAt ?? ""}</div>
                `;

                div.onclick = () => loadConversation(c.id);
                box.appendChild(div);
            }
        } catch {
            document.getElementById('convList').innerHTML =
                "<div class='error'>Server indisponibil</div>";
        }
    }

    async function loadConversation(id){
        try {
            conversationId = id;

            const res = await fetch(`/api/chat/chats/${id}/messages`);
            if (!res.ok) throw new Error();

            const msgs = await res.json();
            renderChat(msgs);

            await refreshConversations(); // 🔥 refresh după ce avem mesajele

        } catch {
            document.getElementById('chatOut').textContent =
                "Eroare la încărcarea conversației.";
        }
    }

    async function sendChat(){
        const input = document.getElementById('chatMsg');
        const message = input.value.trim();
        if (!message) return;

        try {
            const res = await fetch('/api/chat/send', {
                method:'POST',
                headers:{'Content-Type':'application/json'},
                body: JSON.stringify({
                    conversationId: conversationId,
                    message: message
                })
            });

            if (!res.ok) throw new Error();

            const data = await res.json();
            conversationId = data.conversationId;

            input.value = "";

            // 🔥 încărcăm direct mesajele fără loadConversation
            const res2 = await fetch(`/api/chat/chats/${conversationId}/messages`);
            const msgs = await res2.json();
            renderChat(msgs);

            await refreshConversations();

        } catch (err) {
            document.getElementById('chatOut').textContent =
                "Eroare la trimiterea mesajului.";
            console.error(err);
        }
    }

    function newChat(){
        conversationId = null;
        document.getElementById('chatOut').textContent = "";
        refreshConversations();
    }

    (async function init(){
        await refreshConversations();
    })();
</script>
